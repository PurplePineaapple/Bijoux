modLoader="javafml" #mandatory

loaderVersion="[40,)" #mandatory This is typically bumped every Minecraft version by Forge. See our download page for lists of versions.

license="All rights reserved"

[[mods]] #mandatory

modId="bijoux" #mandatory

version="${file.jarVersion}" #mandatory

displayName="Bijoux Mod" #mandatory

updateJSONURL="https://raw.githubusercontent.com/PurplePineaapple/Bijoux/main/src/main/resources/META-INF/updateChecker.json" #optional

displayURL="https://github.com/PurplePineaapple/Bijoux" #optional

logoFile="ruby512_curseforge.png" #optional

credits="Made for and with PurplePreztle :)" #optional

authors="PurplePineapple" #optional

description='''
Bijoux is a mod that adds to and enhances the overall experience of mining by adding a variety of gems, metals, and materials.

***This is release is in heavy development and features may break and/or not work at all. This version should not be played, except for testing. ***

'''

[[dependencies.bijoux]]
    # the modid of the dependency
    modId="forge" #mandatory
    # Does this dependency have to exist - if not, ordering below must be specified
    mandatory=true #mandatory
    # The version range of the dependency
    versionRange="[40,)" #mandatory
    # An ordering relationship for the dependency - BEFORE or AFTER required if the relationship is not mandatory
    ordering="NONE"
    # Side this dependency is applied on - BOTH, CLIENT or SERVER
    side="BOTH"
# Here's another dependency
[[dependencies.bijoux]]
    modId="minecraft"
    mandatory=true
# This version range declares a minimum of the current minecraft version up to but not including the next major version
    versionRange="[1.18.2,1.19)"
    ordering="NONE"
    side="BOTH"
